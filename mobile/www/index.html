<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Benefits Navigator — offline</title>
    <!--
      OFFLINE FALLBACK ONLY. This is the tiny bundled page Capacitor shows when
      the hosted app (capacitor.config.ts `server.url`) can't be reached. The
      real app is the hosted Django site; this is just a graceful, accessible
      "no connection" state. Styles are inlined because this file loads with no
      network. Colors mirror the app's Tailwind palette and honor dark mode.
    -->
    <style>
      :root {
        --bg: #ffffff; --fg: #111827; --muted: #4b5563; --brand: #1e40af;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #111827; --fg: #f3f4f6; --muted: #9ca3af; --brand: #93b3f5; }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-content: center;
        gap: 0.75rem; padding: 2rem; text-align: center;
        background: var(--bg); color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
      }
      h1 { font-size: 1.5rem; margin: 0; color: var(--brand); }
      p { margin: 0; color: var(--muted); max-width: 40ch; }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Benefits Navigator needs a connection to reach your claims and
        documents. Check your network and try again.
      </p>
    </main>
  </body>
</html>
