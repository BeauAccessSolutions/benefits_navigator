{% extends 'base.html' %}
{% load static %}

{% block title %}Assistant - {{ SITE_NAME }}{% endblock %}

{% block extra_css %}
<style>
  /* Decorative streaming motion is GATED on reduced-motion (docs/ux §3.4, §6.3). */
  @media (prefers-reduced-motion: no-preference) {
    .assistant-caret { animation: bn-blink 1s step-end infinite; }
    .thinking-dots::after { animation: bn-dots 1.2s steps(4, end) infinite; content: ''; }
    .assistant-answer.is-streaming .assistant-caret { display: inline-block; }
  }
  @media (prefers-reduced-motion: reduce) {
    .assistant-caret { display: none !important; }
    .thinking-dots::after { content: '…'; }   /* static */
  }
  .assistant-caret {
    display: none; width: 2px; height: 1.1em; margin-left: 2px;
    background: currentColor; vertical-align: text-bottom;
  }
  @keyframes bn-blink { 50% { opacity: 0; } }
  @keyframes bn-dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
  }
  .assistant-answer { white-space: pre-wrap; }
</style>
{% endblock %}

{% block content %}
{# Endpoints ride on data-* so static/js/assistant.js needs no template rendering
   and the page can ship with no inline <script>. #}
<div id="assistant-app" class="max-w-3xl mx-auto flex flex-col" style="min-height: 60vh;"
     data-stream-url="{% url 'agents:assistant_stream' %}"
     data-stop-url="{% url 'agents:assistant_stop' %}">

  {# ---- Live-region spine (docs/ux §6.1): one polite, one assertive ---- #}
  <div id="assistant-status" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <div id="assistant-error-live" role="alert" aria-live="assertive" class="sr-only"></div>

  {# ---- Thread: persisted turns survive reload; empty state only at zero turns ---- #}
  <div id="assistant-thread" class="flex-grow space-y-4 mb-6">
    {% if turns %}
      {% for turn in turns %}
        {% if turn.role == "user" %}
        <div class="ml-auto max-w-[85%] rounded-2xl bg-blue-600 text-white px-4 py-2">{{ turn.content }}</div>
        {% else %}
        <div class="mr-auto max-w-[90%] rounded-2xl bg-white border border-gray-200 px-4 py-3">
          <div class="assistant-answer text-gray-900" tabindex="-1" aria-label="Assistant response">{{ turn.content }}</div>
          {% if turn.stopped %}<div class="mt-2 text-sm text-gray-500">Stopped.</div>{% endif %}
        </div>
        {% endif %}
      {% endfor %}
    {% else %}
    <section id="assistant-empty" aria-labelledby="assistant-empty-heading" class="text-center py-8">
      <h1 id="assistant-empty-heading" class="text-2xl font-bold text-gray-900">{{ empty.heading }}</h1>
      <p class="text-gray-600 mt-2">{{ empty.subheading }}</p>

      <ul class="mt-6 grid gap-3 sm:grid-cols-2 text-left" role="list">
        {% for chip in empty.chips %}
        <li>
          <button type="button"
                  class="chip w-full min-h-[44px] rounded-xl border border-gray-200 bg-white px-4 py-3
                         text-gray-800 hover:bg-gray-50 focus:outline-none focus-visible:ring-2
                         focus-visible:ring-blue-500"
                  data-chip-prompt="{{ chip.text }}">
            {{ chip.text }}
          </button>
        </li>
        {% endfor %}
      </ul>

      <p class="text-sm text-gray-500 mt-6">{{ empty.expectation }}</p>
    </section>
    {% endif %}
  </div>

  {# ---- Composer (docs/ux §2) ---- #}
  <form id="composer-form" class="sticky bottom-0 bg-gray-50 pt-2">
    {% csrf_token %}
    <div class="flex items-end gap-2 rounded-2xl border border-gray-300 bg-white p-2 shadow-sm
                focus-within:ring-2 focus-within:ring-blue-500">
      <label for="composer-input" class="sr-only">Ask the assistant a question</label>
      <textarea id="composer-input" name="prompt" rows="1"
                class="flex-grow resize-none border-0 focus:ring-0 text-base leading-6 max-h-40"
                style="font-size:16px;" placeholder="Ask about your VA benefits…"
                inputmode="text" autocomplete="off"></textarea>

      {# Send: disabled until non-whitespace content (not color-only; aria-disabled + disabled attr) #}
      <button id="send-btn" type="submit" disabled aria-disabled="true"
              class="shrink-0 min-h-[44px] min-w-[44px] rounded-xl bg-blue-600 px-4 text-white font-medium
                     disabled:opacity-40 disabled:cursor-not-allowed
                     hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2
                     focus-visible:ring-blue-500">
        Send
      </button>

      {# Stop generating: visible text, keyboard-focusable, only shown while streaming #}
      <button id="stop-btn" type="button" hidden
              class="shrink-0 min-h-[44px] rounded-xl border border-gray-300 px-4 font-medium text-gray-800
                     hover:bg-gray-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
        Stop generating
      </button>
    </div>
    <p class="text-xs text-gray-500 text-center mt-2">{{ disclaimer }}</p>
  </form>
</div>

{# Copy deck for JS (status + error strings). No PHI here. #}
{{ status|json_script:"assistant-status-copy" }}
{{ errors|json_script:"assistant-errors-copy" }}
{% endblock %}

{% block extra_js %}
{# Extracted to static/js/assistant.js: unit-tested in tests/js/, and no inline
   <script> means one less reason to need 'unsafe-inline' in the CSP. #}
<script src="{% static 'js/assistant.js' %}" defer></script>
{% endblock %}
